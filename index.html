<!DOCTYPE html>
<html>

<head>

<title>AI Music Composer</title>

<script src="https://cdn.jsdelivr.net/npm/@magenta/music@1.23.1/es6/core.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@magenta/music@1.23.1/es6/music_rnn.js"></script>

<script src="https://cdn.jsdelivr.net/npm/tone@14.7.77/build/Tone.js"></script>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="app">

<h1>🎵 AI Music Studio</h1>

<div class="prompt-box">

<input id="prompt" placeholder="Describe music (happy piano, sad melody...)">

<button onclick="generateMusic()">Generate</button>

</div>

<div class="controls">

<label>Creativity</label>
<input type="range" id="temperature" min="0.5" max="1.5" step="0.1" value="1">

<label>Tempo</label>
<input type="range" id="tempo" min="60" max="160" value="100">

</div>

<div class="player">

<button onclick="playMusic()">▶ Play</button>
<button onclick="stopMusic()">⏹ Stop</button>
<button onclick="downloadMidi()">⬇ Download MIDI</button>

</div>

<canvas id="visualizer"></canvas>

<p id="status">Status: Ready</p>

</div>

<script src="script.js"></script>

</body>
</html>
